<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up / Log In</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 全屏背景：雪山图 + 黑白滤镜
           可替换为本地图：url('images/snow-mountain.jpg') 或自定义链接 */
        .page-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            /* 可替换为本地图：url('images/snow-mountain.jpg') 或其他1920+雪山图 */
            background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1920') center/cover no-repeat;
            filter: grayscale(100%);
        }
        .page-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.25);
        }

        /* 顶部栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            z-index: 10;
        }
        .close-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.25rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.35);
            border-color: rgba(255, 255, 255, 0.6);
        }
        .step-indicator {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* 主容器 */
        .main-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5rem 1rem 2rem;
        }

        /* 玻璃毛边卡片 */
        .glass-card {
            width: 100%;
            max-width: 680px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            padding: 2.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            align-items: start;
        }
        @media (max-width: 700px) {
            .glass-card {
                grid-template-columns: 1fr;
                padding: 2rem;
            }
        }

        /* 左侧：表单 */
        .form-side h1 {
            color: rgba(255, 255, 255, 0.98);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.75rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 12px;
            font-size: 0.95rem;
            color: #1f2937;
        }
        .form-group input::placeholder {
            color: #9ca3af;
        }
        .form-group input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 1);
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.3);
        }

        /* 右侧：按钮区 */
        .action-side {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 1rem;
        }
        .btn-signup {
            width: 100%;
            padding: 0.9rem 1.5rem;
            background: #1f2937;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }
        .btn-signup:hover {
            background: #111827;
            transform: translateY(-1px);
        }
        .btn-signup:active {
            transform: translateY(0);
        }
        .link-login {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.875rem;
            text-align: center;
            text-decoration: none;
            transition: color 0.2s;
        }
        .link-login:hover {
            color: rgba(255, 255, 255, 1);
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.3);
        }
        .btn-social-wrap {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        /* 第三方按钮：浅灰色圆角，QQ蓝/微信绿图标 */
        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.95);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .btn-social:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .btn-social.qq .icon {
            color: #3b82f6;
        }
        .btn-social.qq {
            color: rgba(255, 255, 255, 0.95);
        }
        .btn-social.wechat .icon {
            color: #22c55e;
        }
        .btn-social.wechat {
            color: rgba(255, 255, 255, 0.95);
        }
    </style>
</head>
<body>
    <div class="page-bg"></div>
    <header class="top-bar">
        <button type="button" class="close-btn" aria-label="Close">&times;</button>
        <span class="step-indicator">1/3</span>
    </header>

    <main class="main-wrap">
        <div class="glass-card">
            <div class="form-side">
                <h1>Sign Up</h1>
                <form id="signupForm">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" placeholder="Enter your full name" autocomplete="name">
                    </div>
                    <div class="form-group">
                        <label for="telephone">Telephone</label>
                        <input type="tel" id="telephone" placeholder="Enter your phone number" autocomplete="tel">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter password" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm password" autocomplete="new-password">
                    </div>
                </form>
            </div>
            <div class="action-side">
                <button type="button" class="btn-signup" id="btnSignup">Sign Up</button>
                <a href="#" class="link-login" id="linkLogin">Already have an account? Log in</a>
                <div class="divider">Or</div>
                <div class="btn-social-wrap">
                    <button type="button" class="btn-social qq">
                        <i class="fab fa-qq icon"></i>
                        Sign Up with QQ
                    </button>
                    <button type="button" class="btn-social wechat">
                        <i class="fab fa-weixin icon"></i>
                        Sign Up with WeChat
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        (function() {
            let isLoginMode = false;
            const signupFormHTML = document.getElementById('signupForm').innerHTML;
            const titleEl = document.querySelector('.form-side h1');
            const formEl = document.getElementById('signupForm');
            const btnEl = document.getElementById('btnSignup');
            const linkEl = document.getElementById('linkLogin');

            document.querySelector('.close-btn')?.addEventListener('click', () => {
                if (window.history.length > 1) window.history.back();
                else window.location.href = 'index.html';
            });

            btnEl?.addEventListener('click', () => {
                const p = document.getElementById('password');
                const cp = document.getElementById('confirmPassword');
                if (isLoginMode) {
                    console.log('Log in submitted');
                } else {
                    if (!p || !cp) return;
                    if (p.value !== cp.value) { alert('Passwords do not match'); return; }
                    console.log('Sign up submitted');
                }
            });

            linkEl?.addEventListener('click', (e) => {
                e.preventDefault();
                if (isLoginMode) {
                    titleEl.textContent = 'Sign Up';
                    formEl.innerHTML = signupFormHTML;
                    btnEl.textContent = 'Sign Up';
                    linkEl.textContent = 'Already have an account? Log in';
                    isLoginMode = false;
                } else {
                    titleEl.textContent = 'Log In';
                    formEl.innerHTML = `
                        <div class="form-group">
                            <label for="email">Email / Telephone</label>
                            <input type="text" id="email" placeholder="Enter email or phone">
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" placeholder="Enter password">
                        </div>
                    `;
                    btnEl.textContent = 'Log In';
                    linkEl.textContent = "Don't have an account? Sign up";
                    isLoginMode = true;
                }
            });

            document.querySelectorAll('.btn-social').forEach(btn => {
                btn.addEventListener('click', () => console.log('Social login:', btn.textContent.trim()));
            });
        })();
    </script>
</body>
</html>
